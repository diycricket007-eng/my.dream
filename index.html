<!DOCTYPE html>
<html>

<head>

  <title>AI Hub</title>

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      width:450px;
      background:#1e293b;
      padding:25px;
      border-radius:20px;
      text-align:center;
    }

    h1{
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      margin-top:15px;
      background:cyan;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    #answer{
      margin-top:20px;
      background:#0f172a;
      padding:15px;
      border-radius:10px;
      min-height:100px;
      text-align:left;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>AI Hub 🤖</h1>

    <input
      type="text"
      id="question"
      placeholder="Ask anything..."
    >

    <button onclick="askAI()">
      Ask AI
    </button>

    <div id="answer">
      AI response appears here...
    </div>

  </div>

  <script>

    function askAI(){

      let question =
      document.getElementById("question").value.toLowerCase();

      let answer = "";

      if(
        question.includes("hello") ||
        question.includes("hi")
      ){

        answer =
        "👋 Hello! Welcome to AI Hub.";

      }

      else if(
        question.includes("cricket")
      ){

        answer =
        "🏏 Cricket AI: India and Australia are top cricket teams.";

      }

      else if(
        question.includes("football") ||
        question.includes("soccer")
      ){

        answer =
        "⚽ Football AI: Messi and Ronaldo are football legends.";

      }

      else if(
        question.includes("weather")
      ){

        answer =
        "🌤 Weather AI: Today's weather looks sunny.";

      }

      else if(
        question.includes("coding") ||
        question.includes("html") ||
        question.includes("javascript")
      ){

        answer =
        "💻 Coding AI: HTML builds websites, CSS designs them, JavaScript adds logic.";

      }

      else if(
        question.includes("game") ||
        question.includes("gaming")
      ){

        answer =
        "🎮 Gaming AI: Minecraft and GTA are very popular games.";

      }

      else if(
        question.includes("movie")
      ){

        answer =
        "🎬 Movie AI: Interstellar is a great sci-fi movie.";

      }

      else if(
        question.includes("music")
      ){

        answer =
        "🎵 Music AI: Music makes websites feel more interactive.";

      }

      else{

        answer =
        "🤖 AI Hub: I am still learning new things.";

      }

      document.getElementById("answer").innerHTML =
      answer;

    }

  </script>

</body>

</html>

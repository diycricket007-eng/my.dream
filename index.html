<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dream Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    }

    h1{
      font-size:60px;
      margin-bottom:20px;
    }

    p{
      font-size:22px;
      max-width:700px;
      line-height:1.6;
    }

    button{
      margin-top:30px;
      padding:15px 35px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:black;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
      background:white;
    }

    section{
      padding:80px 20px;
      text-align:center;
    }

    .card-container{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:40px;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      width:250px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome to My Dream Website 🚀</h1>

  <p>
    I’m learning web development and building cool things
    using HTML, CSS, and JavaScript.
  </p>

  <button onclick="showMessage()">
    Click Here
  </button>
</header>

<section>
  <h2>What I’m Learning</h2>

  <div class="card-container">

    <div class="card">
      <h3>HTML</h3>
      <p>Building the structure of websites.</p>
    </div>

    <div class="card">
      <h3>CSS</h3>
      <p>Making websites beautiful and modern.</p>
    </div>

    <div class="card">
      <h3>JavaScript</h3>
      <p>Adding animations and interactions.</p>
    </div>

  </div>
</section>

<script>
  function showMessage(){
    alert("Thanks for visiting my website!");
  }
</script>

</body>
</html>

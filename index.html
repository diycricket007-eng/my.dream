<!DOCTYPE html>
<html>

<head>

  <title>AI Hub</title>

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      margin:0;
    }

    header{
      text-align:center;
      padding:60px;
      background:linear-gradient(135deg,#0f172a,#2563eb);
    }

    header h1{
      font-size:60px;
    }

    header p{
      font-size:22px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:30px;
      padding:40px;
    }

    .card{
      background:#1e293b;
      width:300px;
      padding:25px;
      border-radius:20px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    h2{
      color:cyan;
    }

    input{
      width:90%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:15px;
    }

    button{
      width:95%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:cyan;
      margin-top:15px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .answer{
      margin-top:15px;
      background:#0f172a;
      padding:15px;
      border-radius:10px;
      min-height:70px;
    }

  </style>

</head>

<body>

  <header>

    <h1>AI Hub 🚀</h1>

    <p>
      Explore different AI assistants.
    </p>

  </header>

  <div class="container">

    <!-- SPORTS AI -->

    <div class="card">

      <h2>🏏 Sports AI</h2>

      <input
        id="sports"
        placeholder="Ask about sports"
      >

      <button onclick="sportsAI()">
        Ask Sports AI
      </button>

      <div class="answer" id="sportsAnswer">
      </div>

    </div>

    <!-- WEATHER AI -->

    <div class="card">

      <h2>🌤 Weather AI</h2>

      <input
        id="weather"
        placeholder="Ask about weather"
      >

      <button onclick="weatherAI()">
        Ask Weather AI
      </button>

      <div class="answer" id="weatherAnswer">
      </div>

    </div>

    <!-- CODING AI -->

    <div class="card">

      <h2>💻 Coding AI</h2>

      <input
        id="coding"
        placeholder="Ask coding questions"
      >

      <button onclick="codingAI()">
        Ask Coding AI
      </button>

      <div class="answer" id="codingAnswer">
      </div>

    </div>

    <!-- GAMING AI -->

    <div class="card">

      <h2>🎮 Gaming AI</h2>

      <input
        id="gaming"
        placeholder="Ask gaming questions"
      >

      <button onclick="gamingAI()">
        Ask Gaming AI
      </button>

      <div class="answer" id="gamingAnswer">
      </div>

    </div>

  </div>

  <script>

    function sportsAI(){

      let q =
      document.getElementById("sports").value;

      let answer = "";

      if(q.includes("cricket")){

        answer =
        "🏏 Cricket AI: India is one of the best teams.";

      }

      else if(q.includes("football")){

        answer =
        "⚽ Football AI: Messi is legendary.";

      }

      else{

        answer =
        "🏅 Sports AI is thinking...";

      }

      document.getElementById("sportsAnswer").innerHTML =
      answer;

    }

    function weatherAI(){

      document.getElementById("weatherAnswer").innerHTML =
      "🌤 Weather AI: Today looks sunny.";

    }

    function codingAI(){

      document.getElementById("codingAnswer").innerHTML =
      "💻 Coding AI: Learn HTML, CSS and JavaScript.";

    }

    function gamingAI(){

      document.getElementById("gamingAnswer").innerHTML =
      "🎮 Gaming AI: Minecraft and GTA are popular games.";

    }

  </script>

</body>

</html>

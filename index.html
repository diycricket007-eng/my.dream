<script>

async function askAI(){

  let question =
  document.getElementById("question").value;

  document.getElementById("answer").innerHTML =
  "Thinking...";

  try{

    let response = await fetch(

      "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyAiHoP8cbYPTJQi7DNUeZ60Dad9pLz6vEg",

      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({

          contents:[
            {
              parts:[
                {
                  text:question
                }
              ]
            }
          ]

        })

      }

    );

    let data = await response.json();

    console.log(data);

    if(data.error){

      document.getElementById("answer").innerHTML =
      data.error.message;

      return;
    }

    let answer =
    data.candidates[0].content.parts[0].text;

    document.getElementById("answer").innerHTML =
    answer;

  }

  catch(error){

    document.getElementById("answer").innerHTML =
    error;

  }

}

</script>

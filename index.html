<!DOCTYPE html>
<html>

<head>

  <title>Real AI Chatbot</title>

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      width:400px;
      background:#1e293b;
      padding:25px;
      border-radius:20px;
    }

    h1{
      text-align:center;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      margin-top:15px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      margin-top:15px;
      background:cyan;
      font-size:18px;
      cursor:pointer;
      font-weight:bold;
    }

    #answer{
      margin-top:20px;
      background:#0f172a;
      padding:15px;
      border-radius:10px;
      min-height:100px;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>AI Chatbot 🤖</h1>

    <input
      type="text"
      id="question"
      placeholder="Ask anything..."
    >

    <button onclick="askAI()">
      Ask AI
    </button>

    <div id="answer">
      AI response appears here...
    </div>

  </div>

  <script>

    async function askAI(){

      let question =
      document.getElementById("question").value;

      document.getElementById("answer").innerHTML =
      "Thinking...";

      try{

        const response = await fetch(

          "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyACJy3mp1j-xvkg3U8PyERidvafreOWfmI",

          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({

              contents: [
                {
                  parts: [
                    {
                      text: question
                    }
                  ]
                }
              ]

            })

          }

        );

        const data = await response.json();

        console.log(data);

        if(data.error){

          document.getElementById("answer").innerHTML =
          data.error.message;

          return;
        }

        const answer =
        data.candidates[0].content.parts[0].text;

        document.getElementById("answer").innerHTML =
        answer;

      }

      catch(error){

        document.getElementById("answer").innerHTML =
        "Connection error.";

      }

    }

  </script>

</body>

</html>

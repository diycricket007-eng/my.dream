<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AI Hub</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      text-align:center;
      padding:60px 20px;
      background:linear-gradient(135deg,#0f172a,#2563eb);
    }

    header h1{
      font-size:60px;
      margin-bottom:20px;
    }

    header p{
      font-size:22px;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:30px;
      padding:50px;
    }

    .card{
      background:#1e293b;
      width:300px;
      padding:25px;
      border-radius:20px;
      transition:0.3s;
      box-shadow:0 0 15px rgba(0,0,0,0.3);
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card h2{
      margin-bottom:15px;
      color:cyan;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      margin-bottom:10px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:cyan;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    .answer{
      margin-top:15px;
      background:#0f172a;
      padding:15px;
      border-radius:10px;
      min-height:60px;
    }

  </style>
</head>

<body>

  <header>

    <h1>AI Hub 🚀</h1>

    <p>
      Explore different AI assistants for sports, weather,
      coding, gaming and more.
    </p>

  </header>

  <div class="container">

    <!-- SPORTS AI -->

    <div class="card">

      <h2>🏏 Sports AI</h2>

      <input type="text" id="sportsInput"
      placeholder="Ask about cricket or football">

      <button onclick="sportsAI()">
        Ask Sports AI
      </button>

      <div class="answer" id="sportsAnswer"></div>

    </div>

    <!-- WEATHER AI -->

    <div class="card">

      <h2>🌦 Weather AI</h2>

      <input type="text" id="weatherInput"
      placeholder="Ask about weather">

      <button onclick="weatherAI()">
        Ask Weather AI
      </button>

      <div class="answer" id="weatherAnswer"></div>

    </div>

    <!-- CODING AI -->

    <div class="card">

      <h2>💻 Coding AI</h2>

      <input type="text" id="codeInput"
      placeholder="Ask coding questions">

      <button onclick="codingAI()">
        Ask Coding AI
      </button>

      <div class="answer" id="codeAnswer"></div>

    </div>

    <!-- GAMING AI -->

    <div class="card">

      <h2>🎮 Gaming AI</h2>

      <input type="text" id="gameInput"
      placeholder="Ask gaming questions">

      <button onclick="gamingAI()">
        Ask Gaming AI
      </button>

      <div class="answer" id="gameAnswer"></div>

    </div>

  </div>

  <script>

    function sportsAI(){

      let q =
      document.getElementById("sportsInput").value;

      let answer = "";

      if(q.includes("cricket")){
        answer =
        "🏏 Cricket AI: India and Australia are top cricket teams.";
      }

      else if(q.includes("football")){
        answer =
        "⚽ Football AI: Real Madrid is one of the biggest clubs.";
      }

      else{
        answer =
        "Sports AI could not understand your question.";
      }

      document.getElementById("sportsAnswer").innerHTML =
      answer;
    }

    function weatherAI(){

      document.getElementById("weatherAnswer").innerHTML =
      "🌤 Weather AI: Today's weather looks sunny.";
    }

    function codingAI(){

      document.getElementById("codeAnswer").innerHTML =
      "💻 Coding AI: Try learning HTML, CSS and JavaScript first.";
    }

    function gamingAI(){

      document.getElementById("gameAnswer").innerHTML =
      "🎮 Gaming AI: Minecraft and GTA are popular games.";
    }

  </script>

</body>
</html>

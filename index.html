<!DOCTYPE html>
<html>

<head>
  <title>AI Chatbot</title>

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      width:400px;
      background:#1e293b;
      padding:20px;
      border-radius:20px;
    }

    input{
      width:100%;
      padding:15px;
      margin-top:10px;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:cyan;
      font-size:18px;
      cursor:pointer;
    }

    #answer{
      margin-top:20px;
      background:#0f172a;
      padding:15px;
      border-radius:10px;
      min-height:100px;
    }

  </style>
</head>

<body>

  <div class="box">

    <h1>AI Chatbot 🤖</h1>

    <input
      id="question"
      placeholder="Ask something..."
    >

    <button onclick="askAI()">
      Ask AI
    </button>

    <div id="answer">
      AI response appears here...
    </div>

  </div>

  <script>

    async function askAI(){

      let question =
      document.getElementById("question").value;

      document.getElementById("answer").innerHTML =
      "Thinking...";

      try{

        let response = await fetch(

          "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AIzaSyAiHoP8cbYPTJQi7DNUeZ60Dad9pLz6vEg",

          {
            method:"POST",

            headers:{
              "Content-Type":"application/json"
            },

            body:JSON.stringify({

              contents:[
                {
                  parts:[
                    {
                      text:question
                    }
                  ]
                }
              ]

            })

          }

        );

        let data = await response.json();

        console.log(data);

        let answer =
        data.candidates[0].content.parts[0].text;

        document.getElementById("answer").innerHTML =
        answer;

      }

      catch(error){

        document.getElementById("answer").innerHTML =
        "Error connecting to AI.";

      }

    }

  </script>

</body>

</html>

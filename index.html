<!DOCTYPE html>
<html>

<head>
  <title>AI Hub</title>

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      margin:0;
      padding:40px;
      text-align:center;
    }

    h1{
      font-size:50px;
    }

    .box{
      background:#1e293b;
      width:400px;
      margin:auto;
      padding:20px;
      border-radius:20px;
      margin-top:30px;
    }

    input{
      width:90%;
      padding:15px;
      border:none;
      border-radius:10px;
      margin-top:15px;
    }

    button{
      width:90%;
      padding:15px;
      border:none;
      border-radius:10px;
      margin-top:15px;
      background:cyan;
      font-size:18px;
      cursor:pointer;
    }

    #answer{
      margin-top:20px;
      background:#0f172a;
      padding:15px;
      border-radius:10px;
      min-height:80px;
    }

  </style>
</head>

<body>

  <h1>AI Hub 🚀</h1>

  <div class="box">

    <input
      type="text"
      id="question"
      placeholder="Ask something..."
    >

    <button onclick="reply()">
      Ask AI
    </button>

    <div id="answer">
      AI response appears here...
    </div>

  </div>

  <script>

    function reply(){

      let q =
      document.getElementById("question").value;

      let response = "";

      if(q.includes("cricket")){

        response =
        "🏏 Cricket AI: India is a strong cricket team.";

      }

      else if(q.includes("football")){

        response =
        "⚽ Football AI: Messi is one of the greatest players.";

      }

      else if(q.includes("weather")){

        response =
        "🌤 Weather AI: It looks sunny today.";

      }

      else{

        response =
        "🤖 AI: I am still learning.";

      }

      document.getElementById("answer").innerHTML =
      response;

    }

  </script>

</body>

</html>

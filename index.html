<script>

function askAI(){

  let question =
  document.getElementById("question").value.toLowerCase();

  let answer = "";

  if(
    question.includes("hello") ||
    question.includes("hi")
  ){

    answer =
    "👋 Hello! Welcome to AI Hub.";

  }

  else if(
    question.includes("cricket")
  ){

    answer =
    "🏏 Cricket AI: India and Australia are top cricket teams.";

  }

  else if(
    question.includes("football") ||
    question.includes("soccer")
  ){

    answer =
    "⚽ Football AI: Messi and Ronaldo are football legends.";

  }

  else if(
    question.includes("weather")
  ){

    answer =
    "🌤 Weather AI: Today's weather looks sunny and pleasant.";

  }

  else if(
    question.includes("code") ||
    question.includes("coding") ||
    question.includes("html")
  ){

    answer =
    "💻 Coding AI: HTML builds structure, CSS designs, JavaScript adds logic.";

  }

  else if(
    question.includes("game") ||
    question.includes("gaming")
  ){

    answer =
    "🎮 Gaming AI: Minecraft, GTA and Fortnite are popular games.";

  }

  else if(
    question.includes("movie")
  ){

    answer =
    "🎬 Movie AI: Interstellar and Avengers are highly rated movies.";

  }

  else if(
    question.includes("music") ||
    question.includes("song")
  ){

    answer =
    "🎵 Music AI: Music makes websites feel alive and interactive.";

  }

  else if(
    question.includes("ai")
  ){

    answer =
    "🤖 AI Hub: Artificial Intelligence helps machines think like humans.";

  }

  else if(
    question.includes("who made you")
  ){

    answer =
    "🚀 I was created as part of your AI Hub website.";

  }

  else{

    answer =
    "🤖 AI Hub: I am still learning new things.";

  }

  document.getElementById("answer").innerHTML =
  answer;

}

</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Defender</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#87ceeb;
    text-align:center;
    margin:0;
}
h1{
    background:#333;
    color:white;
    margin:0;
    padding:15px;
}
#game{
    padding:20px;
}
.panel{
    background:white;
    margin:10px auto;
    padding:15px;
    border-radius:10px;
    width:300px;
}
button{
    padding:10px;
    margin:5px;
    font-size:16px;
}
#log{
    height:200px;
    overflow-y:auto;
    background:#eee;
    padding:10px;
    text-align:left;
}
</style>
</head>

<body>

<h1>🏰 Kingdom Defender</h1>

<div id="game">

<div class="panel">
<h3>Resources</h3>
Gold: <span id="gold">100</span><br>
Soldiers: <span id="soldiers">0</span><br>
Castle HP: <span id="castle">100</span>
</div>

<div class="panel">
<button onclick="trainSoldier()">⚔️ Train Soldier (20 Gold)</button>
<button onclick="upgradeCastle()">🏰 Upgrade Castle (100 Gold)</button>
</div>

<div class="panel">
<h3>Wave <span id="wave">1</span></h3>
Enemy Strength: <span id="enemy">5</span>
</div>

<div class="panel">
<h3>Battle Log</h3>
<div id="log"></div>
</div>

</div>

<script>

let gold=100;
let soldiers=0;
let castleHP=100;
let wave=1;
let enemyStrength=5;

function updateUI(){
document.getElementById("gold").innerText=gold;
document.getElementById("soldiers").innerText=soldiers;
document.getElementById("castle").innerText=castleHP;
document.getElementById("wave").innerText=wave;
document.getElementById("enemy").innerText=enemyStrength;
}

function log(text){
document.getElementById("log").innerHTML =
text + "<br>" +
document.getElementById("log").innerHTML;
}

function trainSoldier(){
if(gold>=20){
gold-=20;
soldiers++;
log("⚔️ Soldier trained");
updateUI();
}
}

function upgradeCastle(){
if(gold>=100){
gold-=100;
castleHP+=50;
log("🏰 Castle upgraded");
updateUI();
}
}

setInterval(()=>{
gold+=5;
updateUI();
},1000);

function battleWave(){

let power=soldiers*3;

if(power>=enemyStrength){
gold+=50+wave*10;
log("✅ Wave "+wave+" defeated");
wave++;
enemyStrength+=3;
}
else{
let damage=enemyStrength-power;
castleHP-=damage;
log("❌ Castle took "+damage+" damage");

if(castleHP<=0){
alert("Game Over!");
location.reload();
}
}

updateUI();

}

setInterval(battleWave,5000);

updateUI();

</script>

</body>
</html>
